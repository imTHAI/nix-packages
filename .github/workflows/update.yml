name: Update packages

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 6am UTC
  workflow_dispatch: {}

jobs:
  update-keka:
    # keka.meta.platforms is darwin-only — nix-update --build needs a darwin
    # builder; Linux runners refuse with "not available on hostPlatform".
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # DeterminateSystems installer handles macOS runners correctly —
      # cachix/install-nix-action fails with eDSRecordAlreadyExists because
      # the GitHub macOS image already has _nixbld users. DS installer also
      # enables flakes by default.
      - uses: DeterminateSystems/nix-installer-action@v14

      # nix-update reads src.url / version straight from the derivation, fetches
      # the latest GitHub release, recomputes the hash and rewrites the file.
      # --flake resolves `keka` as a flake output instead of a nixpkgs path.
      # We capture whether any file was actually modified so downstream steps
      # can gate on real changes rather than running unconditionally.
      - name: Run nix-update
        id: nix-update
        run: |
          nix run nixpkgs#nix-update -- keka --flake --build
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Sync the version badge in README.md to match the bumped package.nix.
      # Runs only when nix-update actually changed something; the sed pattern
      # targets the keka table row specifically to avoid false matches.
      - name: Update README version
        if: steps.nix-update.outputs.changed == 'true'
        run: |
          NEW_VERSION=$(grep -m1 'version = ' pkgs/keka/package.nix | grep -o '"[^"]*"' | tr -d '"')
          # Target only the keka table row; replace the first backtick-version on that line.
          sed -i '' "/pkgs\/keka/s/\`[0-9][0-9.]*\`/\`${NEW_VERSION}\`/" README.md

      - uses: peter-evans/create-pull-request@v6
        if: steps.nix-update.outputs.changed == 'true'
        id: cpr
        with:
          commit-message: "keka: automated version bump"
          title: "keka: automated version bump"
          branch: auto-update-keka
          delete-branch: true
          body: |
            Opened automatically by the `update.yml` workflow — `nix-update` detected
            a newer Keka release upstream, bumped `version`/`hash` and verified the
            build succeeds.

      # Always reports — success (PR opened or nothing to do) or failure — so a
      # silent breakage upstream (e.g. nix-update can't parse a new release format)
      # doesn't go unnoticed for weeks.
      - name: Report to Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "${{ job.status }}" != "success" ]; then
            content="❌ **nix-packages: keka update check failed** — see [run details]($RUN_URL)"
          elif [ "${{ steps.nix-update.outputs.changed }}" = "true" ]; then
            content="📦 **keka update available** — PR #${{ steps.cpr.outputs.pull-request-number }} opened: ${{ steps.cpr.outputs.pull-request-url }}"
          else
            content="✅ **keka is up to date** — nothing to do this week."
          fi
          payload=$(jq -n --arg content "$content" '{content: $content}')
          curl -sf -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK_URL"
