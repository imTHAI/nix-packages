name: Update packages

on:
  schedule:
    # Day-of-month step (*/2) rather than a day-count interval, so this
    # fires on odd days (~every 2 days; occasionally 1 or 3 days apart
    # across a month boundary). Public repo => Actions minutes are free,
    # including macOS runners, so the tighter cadence costs nothing.
    - cron: "0 6 */2 * *"
  workflow_dispatch: {}

# The repo default GITHUB_TOKEN is read-only; create-pull-request needs
# contents:write to push the bump branch and pull-requests:write to open
# the PR. The repo setting "Allow GitHub Actions to create and approve
# pull requests" must also be enabled.
permissions:
  contents: write
  pull-requests: write

jobs:
  update-keka:
    # keka.meta.platforms is darwin-only — nix-update --build needs a darwin
    # builder; Linux runners refuse with "not available on hostPlatform".
    runs-on: macos-latest
    outputs:
      changed: ${{ steps.nix-update.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      # DeterminateSystems installer handles macOS runners correctly —
      # cachix/install-nix-action fails with eDSRecordAlreadyExists because
      # the GitHub macOS image already has _nixbld users. DS installer also
      # enables flakes by default.
      - uses: DeterminateSystems/nix-installer-action@v14

      # nix-update reads src.url / version straight from the derivation, fetches
      # the latest GitHub release, recomputes the hash and rewrites the file.
      # --flake resolves `keka` as a flake output instead of a nixpkgs path.
      # We capture whether any file was actually modified so downstream steps
      # can gate on real changes rather than running unconditionally.
      - name: Run nix-update
        id: nix-update
        run: |
          nix run nixpkgs#nix-update -- keka --flake --build
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Sync the version badge in README.md to match the bumped package.nix.
      # Runs only when nix-update actually changed something; the sed pattern
      # targets the keka table row specifically to avoid false matches.
      - name: Update README version
        if: steps.nix-update.outputs.changed == 'true'
        run: |
          NEW_VERSION=$(grep -m1 'version = ' pkgs/keka/package.nix | grep -o '"[^"]*"' | tr -d '"')
          # Target only the keka table row; replace the first backtick-version on that line.
          sed -i '' "/pkgs\/keka/s/\`[0-9][0-9.]*\`/\`${NEW_VERSION}\`/" README.md

      - uses: peter-evans/create-pull-request@v6
        if: steps.nix-update.outputs.changed == 'true'
        id: cpr
        with:
          commit-message: "keka: automated version bump"
          title: "keka: automated version bump"
          branch: auto-update-keka
          delete-branch: true
          body: |
            Opened automatically by the `update.yml` workflow — `nix-update` detected
            a newer Keka release upstream, bumped `version`/`hash` and verified the
            build succeeds.

      # The build already ran (and had to succeed) inside the "Run nix-update"
      # step above, before this PR even existed — there's no further check
      # left to wait on, so merge immediately rather than via GitHub's
      # "auto-merge" (which would just poll for the same already-true result).
      - name: Merge PR
        if: steps.nix-update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge --squash --delete-branch "${{ steps.cpr.outputs.pull-request-number }}"

      # Always reports — success (PR merged or nothing to do) or failure — so a
      # silent breakage upstream (e.g. nix-update can't parse a new release format)
      # doesn't go unnoticed for weeks.
      - name: Report to Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "${{ job.status }}" != "success" ]; then
            content="❌ **nix-packages: keka update check failed** — see [run details]($RUN_URL)"
          elif [ "${{ steps.nix-update.outputs.changed }}" = "true" ]; then
            content="📦 **keka bumped** — PR #${{ steps.cpr.outputs.pull-request-number }} auto-merged: ${{ steps.cpr.outputs.pull-request-url }}"
          else
            content="✅ **keka is up to date** — nothing to do this run."
          fi
          payload=$(jq -n --arg content "$content" '{content: $content}')
          curl -sf -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK_URL"

  update-hipixel:
    # hipixel.meta.platforms is darwin-only, same reasoning as update-keka above.
    runs-on: macos-latest
    outputs:
      changed: ${{ steps.nix-update.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14

      - name: Run nix-update
        id: nix-update
        run: |
          nix run nixpkgs#nix-update -- hipixel --flake --build
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update README version
        if: steps.nix-update.outputs.changed == 'true'
        run: |
          NEW_VERSION=$(grep -m1 'version = ' pkgs/hipixel/package.nix | grep -o '"[^"]*"' | tr -d '"')
          sed -i '' "/pkgs\/hipixel/s/\`[0-9][0-9.]*\`/\`${NEW_VERSION}\`/" README.md

      - uses: peter-evans/create-pull-request@v6
        if: steps.nix-update.outputs.changed == 'true'
        id: cpr
        with:
          commit-message: "hipixel: automated version bump"
          title: "hipixel: automated version bump"
          branch: auto-update-hipixel
          delete-branch: true
          body: |
            Opened automatically by the `update.yml` workflow — `nix-update` detected
            a newer HiPixel release upstream, bumped `version`/`hash` and verified the
            build succeeds.

      - name: Merge PR
        if: steps.nix-update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge --squash --delete-branch "${{ steps.cpr.outputs.pull-request-number }}"

      - name: Report to Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "${{ job.status }}" != "success" ]; then
            content="❌ **nix-packages: hipixel update check failed** — see [run details]($RUN_URL)"
          elif [ "${{ steps.nix-update.outputs.changed }}" = "true" ]; then
            content="📦 **hipixel bumped** — PR #${{ steps.cpr.outputs.pull-request-number }} auto-merged: ${{ steps.cpr.outputs.pull-request-url }}"
          else
            content="✅ **hipixel is up to date** — nothing to do this run."
          fi
          payload=$(jq -n --arg content "$content" '{content: $content}')
          curl -sf -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK_URL"

  update-mist:
    # mist.meta.platforms is darwin-only, same reasoning as update-keka above.
    runs-on: macos-latest
    outputs:
      changed: ${{ steps.nix-update.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14

      - name: Run nix-update
        id: nix-update
        run: |
          nix run nixpkgs#nix-update -- mist --flake --build
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update README version
        if: steps.nix-update.outputs.changed == 'true'
        run: |
          NEW_VERSION=$(grep -m1 'version = ' pkgs/mist/package.nix | grep -o '"[^"]*"' | tr -d '"')
          sed -i '' "/pkgs\/mist/s/\`[0-9][0-9.]*\`/\`${NEW_VERSION}\`/" README.md

      - uses: peter-evans/create-pull-request@v6
        if: steps.nix-update.outputs.changed == 'true'
        id: cpr
        with:
          commit-message: "mist: automated version bump"
          title: "mist: automated version bump"
          branch: auto-update-mist
          delete-branch: true
          body: |
            Opened automatically by the `update.yml` workflow — `nix-update` detected
            a newer Mist release upstream, bumped `version`/`hash` and verified the
            build succeeds.

      - name: Merge PR
        if: steps.nix-update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge --squash --delete-branch "${{ steps.cpr.outputs.pull-request-number }}"

      - name: Report to Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "${{ job.status }}" != "success" ]; then
            content="❌ **nix-packages: mist update check failed** — see [run details]($RUN_URL)"
          elif [ "${{ steps.nix-update.outputs.changed }}" = "true" ]; then
            content="📦 **mist bumped** — PR #${{ steps.cpr.outputs.pull-request-number }} auto-merged: ${{ steps.cpr.outputs.pull-request-url }}"
          else
            content="✅ **mist is up to date** — nothing to do this run."
          fi
          payload=$(jq -n --arg content "$content" '{content: $content}')
          curl -sf -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK_URL"

  update-supacode:
    runs-on: macos-latest
    outputs:
      changed: ${{ steps.nix-update.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14

      - name: Run nix-update
        id: nix-update
        run: |
          nix run nixpkgs#nix-update -- supacode --flake --build
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update README version
        if: steps.nix-update.outputs.changed == 'true'
        run: |
          NEW_VERSION=$(grep -m1 'version = ' pkgs/supacode/package.nix | grep -o '"[^"]*"' | tr -d '"')
          sed -i '' "/pkgs\/supacode/s/\`[0-9][0-9.]*\`/\`${NEW_VERSION}\`/" README.md

      - uses: peter-evans/create-pull-request@v6
        if: steps.nix-update.outputs.changed == 'true'
        id: cpr
        with:
          commit-message: "supacode: automated version bump"
          title: "supacode: automated version bump"
          branch: auto-update-supacode
          delete-branch: true
          body: |
            Opened automatically by the `update.yml` workflow — `nix-update` detected
            a newer Supacode release upstream, bumped `version`/`hash` and verified the
            build succeeds.

      - name: Merge PR
        if: steps.nix-update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge --squash --delete-branch "${{ steps.cpr.outputs.pull-request-number }}"

      - name: Report to Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "${{ job.status }}" != "success" ]; then
            content="❌ **nix-packages: supacode update check failed** — see [run details]($RUN_URL)"
          elif [ "${{ steps.nix-update.outputs.changed }}" = "true" ]; then
            content="📦 **supacode bumped** — PR #${{ steps.cpr.outputs.pull-request-number }} auto-merged: ${{ steps.cpr.outputs.pull-request-url }}"
          else
            content="✅ **supacode is up to date** — nothing to do this run."
          fi
          payload=$(jq -n --arg content "$content" '{content: $content}')
          curl -sf -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK_URL"

  # Pushes/merges made with the built-in GITHUB_TOKEN deliberately don't
  # trigger other workflows (GitHub's anti-recursion rule) — so the merges
  # above land on master but never fire flakehub-publish-rolling.yml's
  # `on: push` trigger. Publish explicitly here instead, once per run,
  # covering whichever package(s) actually got bumped.
  flakehub-publish:
    needs: [update-keka, update-hipixel, update-mist, update-supacode]
    if: |
      always() &&
      (needs.update-keka.outputs.changed == 'true' ||
       needs.update-hipixel.outputs.changed == 'true' ||
       needs.update-mist.outputs.changed == 'true' ||
       needs.update-supacode.outputs.changed == 'true')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/flakehub-push@main
        with:
          visibility: "public"
          name: "imTHAI/nix-packages"
          rolling: true
          include-output-paths: true
